<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="title-wrap" id="title-wrap">
      <h1 class="title" id="title-trigger">2048</h1>
      <div class="title-reset-panel hidden" id="title-reset-panel">
        <button type="button" class="title-reset-btn" id="title-reset-btn">全部重置</button>
      </div>
    </div>
    <header class="header">
      <div class="scores">
        <div class="score-box">
          <span class="score-label">得分</span>
          <span id="score" class="score-value">0</span>
        </div>
        <div class="best-score-wrap" id="best-score-wrap">
          <div class="score-box best" id="best-score-trigger" tabindex="0">
            <span class="score-label">最高</span>
            <span id="best" class="score-value">0</span>
          </div>
          <div class="best-clear-panel hidden" id="best-clear-panel">
            <button type="button" class="best-clear-btn" id="best-clear-btn">清除</button>
          </div>
        </div>
      </div>
    </header>
    <div class="size-select">
      <button type="button" class="size-btn active" data-size="4">4×4</button>
      <button type="button" class="size-btn" data-size="5">5×5</button>
      <button type="button" class="size-btn" data-size="6">6×6</button>
    </div>
    <p class="intro">使用 <strong>方向键</strong> 或 <strong>滑动</strong> 移动方块，相同数字合并加倍！</p>
    <div class="game-wrapper">
      <div id="game-over" class="game-over hidden">
        <p>游戏结束</p>
        <button id="retry-btn" class="btn">再玩一次</button>
      </div>
      <div id="game-win" class="game-win hidden">
        <p>恭喜！达到 2048！</p>
        <button id="keep-playing" class="btn">继续游戏</button>
      </div>
      <div id="grid-container" class="grid-container">
        <div id="grid-background" class="grid-background"></div>
        <div id="tile-container" class="tile-container"></div>
      </div>
    </div>
    <button id="new-game-btn" class="btn new-game-btn">新游戏</button>
  </div>
  <script src="game.js"></script>
</body>
</html>
